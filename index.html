<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Derivadas e Máximos/Mínimos</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Calculadora de Derivadas e Máximos/Mínimos</h1>

    <div class="inputs">
      <label for="numTermos">Quantidade de termos:</label>
      <input type="number" id="numTermos" min="1" required>
      <button onclick="criarEntradas()">Confirmar</button>
      
      <form id="formFuncoes"></form>
      <button onclick="processarFuncao()">Calcular Derivadas</button>
    </div>

    <div class="output">
      <canvas id="grafico"></canvas>
      <div id="saida"></div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
